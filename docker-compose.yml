services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: okp
      POSTGRES_PASSWORD: okp_dev
      POSTGRES_DB: okp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U okp"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: planner-api/Dockerfile.dev
    environment:
      DATABASE_URL: postgresql://okp:okp_dev@postgres:5432/okp
      PORT: 3000
      HOST: 0.0.0.0
      FRONTEND_URL: http://localhost:5173
      NODE_OPTIONS: --no-warnings
    ports:
      - "3000:3000"
    volumes: []
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev --workspace=planner-api

volumes:
  postgres_data:
