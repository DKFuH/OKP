name: Feature Request
description: Propose a feature or improvement for OKP
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to Solve
      placeholder: What user/problem pain exists?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      placeholder: Describe expected behavior/API/UI.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: dod
    attributes:
      label: Definition of Done
      placeholder: Include test command(s) and docs updates.
  - type: input
    id: test_command
    attributes:
      label: Expected validation command
      placeholder: npm run test --workspace planner-api -- src/...test.ts
  - type: dropdown
    id: effort
    attributes:
      label: Estimated Effort
      options:
        - XS (under 1h)
        - S (1-3h)
        - M (0.5-1 day)
        - L (1-2 days)
