name: Bug Report
description: Report a defect or regression in OKP
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: One clear sentence.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What happens now?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Affected files/routes/pages/plugins
      placeholder: planner-api/src/routes/..., planner-frontend/src/...
  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots / Errors
      render: shell
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - high
        - medium
        - low
    validations:
      required: true
  - type: input
    id: test_command
    attributes:
      label: Failing test command (if available)
      placeholder: npm run test --workspace planner-api -- src/...test.ts
